<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Glow Grid - Paris Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="paris_map_data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Nunito', sans-serif; user-select: none; }
        #webgl-container { position: absolute; top:0; left:0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui-layer { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .hud-top-center { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto;}
        .hud-bubble { background: linear-gradient(135deg, #2563eb, #1e3a8a); border: 3px solid white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items:center; justify-content:center; color:white; font-size:24px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-weight: 900;}
        .hud-stats { display: flex; flex-direction: column; gap: 5px; }
        .stat-box { background: rgba(15,23,42,0.85); backdrop-filter: blur(4px); padding: 5px 15px; border-radius: 20px; color: white; display: flex; align-items: center; gap: 8px; font-size: 13px; border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        
        .icon { width: 14px; height: 14px; background: #38bdf8; border-radius: 50%; display:inline-block; }
        .icon.green { background: #4ade80; }
        .icon.gold { background: #fbbf24; border-radius: 4px;}
        
        .hud-right { position: absolute; top: 100px; right: 15px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto;}
        .menu-btn { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(to bottom, #fde047, #eab308); border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items:center; justify-content:center; color: #854d0e; font-size: 20px; transition: transform 0.1s;}
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn.pill { width: 90px; border-radius: 25px; font-size: 11px; font-weight: 950; color: white; display: flex; flex-direction: column; line-height: 1.2; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }

        .hud-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display:flex; gap: 15px; pointer-events: auto; }
        .action-btn { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); border: 3px solid #60a5fa; color: white; padding: 12px 25px; border-radius: 30px; font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); cursor: pointer; transition: all 0.2s;}
        .action-btn:active { transform: translateY(3px); box-shadow: 0 4px 5px rgba(0,0,0,0.3); }
        .action-btn.active { background: linear-gradient(to bottom, #10b981, #047857); border-color:#34d399;}

        /* Energy Bar */
        .energy-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 300px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; pointer-events: auto; }
        #energy-fill { height: 100%; width: 5%; background: linear-gradient(90deg, #4ade80, #facc15); transition: width 0.5s ease-out; }
        .energy-label { position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%); color: white; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* Accessibility Menu */
        .colorblind-menu { position: absolute; top: 170px; right: 15px; background: rgba(15,23,42,0.9); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px; display: none; flex-direction: column; gap: 8px; pointer-events: auto; }
        .cb-btn { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; transition: background 0.2s; }
        .cb-btn:hover { background: #475569; }
        .cb-btn.active { background: #10b981; }
        
        .connection-status { position: absolute; bottom: 20px; right: 20px; font-size: 12px; font-weight: 800; color: #ef4444; text-shadow: 0 1px 2px rgba(0,0,0,0.5); pointer-events: none;}
        .connection-status.connected { color: #10b981; }

        /* Stats Modal Styling */
        .stats-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 20px;
            color: white;
            z-index: 1000;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);

        }
        @keyframes fadeInModal {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stats-header h2 {
            font-size: 15px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #38bdf8, #fbcfe8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-modal {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .close-modal:hover {

        .metric-row {
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .metric-row:last-child {

        }
        .m-label {
            color: rgba(255, 255, 255, 0.7);

            float: right;

        }

            border-radius: 3px;
            transition: width 0.3s ease-out, background-color 0.3s;
        }
    </style>
</head>
<body>

<script>
    // ==========================================
    // GLOBAL STATE
    // ==========================================
    let scene, camera, renderer, controls, sun, ambient, pCurve;
    let districtMeshes = { haussmann: null, defense: null, monuments: [] };
    let districtStates = { haussmann: false, defense: false, monuments: false };
    let isNight = false;
    let controlMode = 'live'; // 'live' or 'manual'
    let labelSprites = [];
    let tokens = [];
    let goldMat, hauMat, defMat, roofMat;

    const WORLD_SIZE = 800; // Smaller, tighter city tile
    const ROAD_SPACING = 40; // Tighter grid
    const BOARD_RADIUS = 450; // Radius of circular tabletop (expanded for real monuments placement)
    
    const instData = { haussmann: [], roofs: [], defense: [], trees: [] };
    const DUMMY = new THREE.Object3D();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); scene.fog = null; 

        // Global Drone View
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 350, 450);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1;
        controls.minDistance = 50; controls.maxDistance = 4000;
        controls.target.set(0, 0, 0);

        // Vibrant Lighting
        ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        
        sun = new THREE.DirectionalLight(0xfffbeb, 1.2);
        sun.position.set(300, 500, 200);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
        sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
        sun.shadow.camera.far = 10000;
        sun.shadow.bias = -0.0005;
        scene.add(sun);

        // Holographic floor grid under tabletop
        const gridHelper = new THREE.GridHelper(1800, 60, 0x1e3a5a, 0x0a0f1e);
        gridHelper.position.y = -12.1;
        gridHelper.material.opacity = 0.4;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);
        // Cyan glow ring around the board
        const ringGeom = new THREE.TorusGeometry(BOARD_RADIUS + 2, 1.5, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8 });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        ring.position.y = -6;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        buildTerrainAndRiver();
        calculateParisLayout();
        buildInstancedMeshes();
        buildParisMonuments();

        // Initialize UI stats
        updateEnergyBar();

        window.addEventListener('resize', onWindowResize);
    }

    // ==========================================
    // PROCEDURAL TEXTURE GENERATORS
    // ==========================================
    function createHaussmannTextures() {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');

        // Background: Paris cream stone
        ctx.fillStyle = '#f1eae0';
        ctx.fillRect(0, 0, 256, 256);

        // Stone joint lines
        ctx.strokeStyle = '#dcd4c7';
        ctx.lineWidth = 1;
        for (let y = 32; y < 256; y += 48) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(256, y);
            ctx.stroke();
        }
        for (let x = 64; x < 256; x += 64) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, 256);
            ctx.stroke();
        }

        // Windows (grid of 4 columns, 5 rows)
        ctx.fillStyle = '#2d3748'; // dark glass
        ctx.strokeStyle = '#cac1b2'; // frame
        ctx.lineWidth = 2;

        const rows = 5;
        const cols = 4;
        const winW = 24;
        const winH = 34;

        for (let r = 0; r < rows; r++) {
            const y = 15 + r * 48;
            for (let c = 0; c < cols; c++) {
                const x = 20 + c * 64;
                ctx.strokeRect(x - 2, y - 2, winW + 4, winH + 4);
                ctx.fillRect(x, y, winW, winH);
                
                // Draw balconies on 2nd (r=1) and 5th (r=4) rows
                if (r === 1 || r === 4) {
                    ctx.fillStyle = '#1e293b'; // iron color
                    ctx.fillRect(x - 4, y + winH - 10, winW + 8, 12);
                    ctx.fillStyle = '#f1eae0';
                    for (let gx = x - 2; gx < x + winW + 4; gx += 4) {
                        ctx.fillRect(gx, y + winH - 8, 1.5, 8);
                    }
                    ctx.fillStyle = '#2d3748';
                }
            }
        }

        // Emissive map (which windows glow)
        const emCanvas = document.createElement('canvas');
        emCanvas.width = 256;
        emCanvas.height = 256;
        const emCtx = emCanvas.getContext('2d');

        emCtx.fillStyle = '#000000';
        emCtx.fillRect(0, 0, 256, 256);

        // Warm yellow lighting
        emCtx.fillStyle = '#fef08a';

        for (let r = 0; r < rows; r++) {
            const y = 15 + r * 48;
            for (let c = 0; c < cols; c++) {
                const x = 20 + c * 64;
                // Roughly 50% occupancy
                const lit = (Math.sin(r * 12.3 + c * 4.5) > 0.0);
                if (lit) {
                    emCtx.fillRect(x, y, winW, winH);
                }
            }
        }

        const map = new THREE.CanvasTexture(canvas);
        const emissiveMap = new THREE.CanvasTexture(emCanvas);
        return { map, emissiveMap };
    }

    function createDefenseTextures() {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');

        // Blue/cyan metallic glass look
        const grad = ctx.createLinearGradient(0, 0, 128, 256);
        grad.addColorStop(0, '#1e3a8a');
        grad.addColorStop(0.5, '#3b82f6');
        grad.addColorStop(1, '#1d4ed8');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 256);

        // Window grid lines
        ctx.strokeStyle = '#0ea5e9';
        ctx.lineWidth = 1;
        const rows = 12;
        const cols = 6;
        const winW = 14;
        const winH = 14;

        for (let r = 0; r <= rows; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * 20 + 8);
            ctx.lineTo(128, r * 20 + 8);
            ctx.stroke();
        }
        for (let c = 0; c <= cols; c++) {
            ctx.beginPath();
            ctx.moveTo(c * 20 + 4, 0);
            ctx.lineTo(c * 20 + 4, 256);
            ctx.stroke();
        }

        // Emissive map
        const emCanvas = document.createElement('canvas');
        emCanvas.width = 128;
        emCanvas.height = 256;
        const emCtx = emCanvas.getContext('2d');

        emCtx.fillStyle = '#000000';
        emCtx.fillRect(0, 0, 128, 256);

        // Bright blue/white office lighting
        emCtx.fillStyle = '#e0f2fe';

        for (let r = 0; r < rows; r++) {
            const y = r * 20 + 10;
            for (let c = 0; c < cols; c++) {
                const x = c * 20 + 6;
                // Roughly 60% lit
                const lit = (Math.sin(r * 7.1 + c * 3.3) > -0.2);
                if (lit) {
                    emCtx.fillRect(x, y, winW, winH);
                }
            }
        }

        const map = new THREE.CanvasTexture(canvas);
        const emissiveMap = new THREE.CanvasTexture(emCanvas);
        return { map, emissiveMap };
    }

    // ===========================================
    // TOPOLOGY
    // ===========================================
    let riverPoints = [];

    function distToSegment(p, a, b) {
        const l2 = (a.x - b.x)**2 + (a.y - b.y)**2;
        if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
        let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (a.x + t * (b.x - a.x)), p.y - (a.y + t * (b.y - a.y)));
    }

    function buildTerrainAndRiver() {
        // Thick circular wooden board (tabletop)
        const boardGeom = new THREE.CylinderGeometry(BOARD_RADIUS, BOARD_RADIUS, 12, 64);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.6, metalness: 0.1 });
        const board = new THREE.Mesh(boardGeom, boardMat);
        board.position.y = -6;
        board.receiveShadow = true;
        scene.add(board);

        // Brass/gold metal rim around the wooden tabletop
        const rimGeom = new THREE.CylinderGeometry(BOARD_RADIUS + 1, BOARD_RADIUS + 1, 12.2, 64, 1, true);
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.15 });
        const rim = new THREE.Mesh(rimGeom, rimMat);
        rim.position.y = -6;
        scene.add(rim);

        // Circular grass lawn surface on top of the wooden board
        const lawnGeom = new THREE.CylinderGeometry(BOARD_RADIUS - 0.5, BOARD_RADIUS - 0.5, 0.4, 64);
        const lawnMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2c, roughness: 0.9, metalness: 0.1 });
        const lawn = new THREE.Mesh(lawnGeom, lawnMat);
        lawn.position.y = 0.2;
        lawn.receiveShadow = true;
        scene.add(lawn);

        // Winding Seine river
        buildWater();
    }

    function createMeshGeometry(entity) {
        const geom = new THREE.BufferGeometry();
        const positions = [];
        const uvs = [];
        const vertices = entity.vertices;
        
        function pushTriangle(v0, v1, v2) {
            const x0 = v0[0], y0 = v0[2] || 0, z0 = v0[1];
            const x1 = v1[0], y1 = v1[2] || 0, z1 = v1[1];
            const x2 = v2[0], y2 = v2[2] || 0, z2 = v2[1];
            positions.push(x0, y0, z0, x1, y1, z1, x2, y2, z2);
            // Box-projection UVs: use dominant normal axis
            const ex1 = x1 - x0, ey1 = y1 - y0, ez1 = z1 - z0;
            const ex2 = x2 - x0, ey2 = y2 - y0, ez2 = z2 - z0;
            const fnx = Math.abs(ey1 * ez2 - ez1 * ey2);
            const fny = Math.abs(ez1 * ex2 - ex1 * ez2);
            const fnz = Math.abs(ex1 * ey2 - ey1 * ex2);
            const sc = 0.08; // UV tiling scale
            if (fny > fnx && fny > fnz) {
                // Top/bottom face → project on XZ
                uvs.push(x0*sc, z0*sc, x1*sc, z1*sc, x2*sc, z2*sc);
            } else if (fnx > fnz) {
                // Side face X-dominant → project on ZY
                uvs.push(z0*sc, y0*sc, z1*sc, y1*sc, z2*sc, y2*sc);
            } else {
                // Side face Z-dominant → project on XY
                uvs.push(x0*sc, y0*sc, x1*sc, y1*sc, x2*sc, y2*sc);
            }
        }
        
        entity.faces.forEach(face => {
            if (face.length === 3) {
                pushTriangle(vertices[face[0]], vertices[face[1]], vertices[face[2]]);
            } else if (face.length === 4) {
                pushTriangle(vertices[face[0]], vertices[face[1]], vertices[face[2]]);
                pushTriangle(vertices[face[0]], vertices[face[2]], vertices[face[3]]);
            } else if (face.length > 4) {
                for (let k = 1; k < face.length - 1; k++) {
                    pushTriangle(vertices[face[0]], vertices[face[k]], vertices[face[k+1]]);
                }
            }
        });
        
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
        geom.computeVertexNormals();
        return geom;
    }

    function createShapeFromVertices(vertices) {
        if (vertices.length < 3) return null;
        const shape = new THREE.Shape();
        shape.moveTo(vertices[0][0], -vertices[0][1]);
        for (let k = 1; k < vertices.length; k++) {
            shape.lineTo(vertices[k][0], -vertices[k][1]);
        }
        return shape;
    }

    function buildRoadsType(layerName, width, material) {
        const positions = [];
        const halfWidth = width / 2;
        
        const roadEntities = window.PARIS_MAP_DATA.filter(ent => ent.layer === layerName);
        
        roadEntities.forEach(ent => {
            const vertices = ent.vertices;
            if (vertices.length < 2) return;
            
            const leftPoints = [];
            const rightPoints = [];
            
            for (let i = 0; i < vertices.length; i++) {
                let dx, dy;
                if (i === 0) {
                    dx = vertices[1][0] - vertices[0][0];
                    dy = vertices[1][1] - vertices[0][1];
                } else if (i === vertices.length - 1) {
                    dx = vertices[i][0] - vertices[i-1][0];
                    dy = vertices[i][1] - vertices[i-1][1];
                } else {
                    const dx1 = vertices[i][0] - vertices[i-1][0];
                    const dy1 = vertices[i][1] - vertices[i-1][1];
                    const len1 = Math.hypot(dx1, dy1) || 1.0;
                    const dx2 = vertices[i+1][0] - vertices[i][0];
                    const dy2 = vertices[i+1][1] - vertices[i][1];
                    const len2 = Math.hypot(dx2, dy2) || 1.0;
                    
                    dx = (dx1 / len1) + (dx2 / len2);
                    dy = (dy1 / len1) + (dy2 / len2);
                }
                
                const len = Math.hypot(dx, dy) || 1.0;
                const nx = -dy / len;
                const ny = dx / len;
                
                const px = vertices[i][0];
                const py = vertices[i][1];
                
                leftPoints.push([px + nx * halfWidth, py + ny * halfWidth]);
                rightPoints.push([px - nx * halfWidth, py - ny * halfWidth]);
            }
            
            for (let i = 0; i < vertices.length - 1; i++) {
                const l0 = leftPoints[i];
                const r0 = rightPoints[i];
                const l1 = leftPoints[i+1];
                const r1 = rightPoints[i+1];
                
                // Segment-level board clipping
                if (Math.hypot(l0[0], l0[1]) < BOARD_RADIUS - 10 && 
                    Math.hypot(r0[0], r0[1]) < BOARD_RADIUS - 10 &&
                    Math.hypot(l1[0], l1[1]) < BOARD_RADIUS - 10 &&
                    Math.hypot(r1[0], r1[1]) < BOARD_RADIUS - 10) {
                    
                    positions.push(l0[0], 0, l0[1]);
                    positions.push(r0[0], 0, r0[1]);
                    positions.push(l1[0], 0, l1[1]);
                    
                    positions.push(r0[0], 0, r0[1]);
                    positions.push(r1[0], 0, r1[1]);
                    positions.push(l1[0], 0, l1[1]);
                }
            }
        });
        
        if (positions.length === 0) return null;
        
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geom.computeVertexNormals();
        
        const mesh = new THREE.Mesh(geom, material);
        mesh.receiveShadow = true;
        return mesh;
    }

    function scatterTreesAlongRoad(vertices, interval = 25) {
        for (let i = 0; i < vertices.length - 1; i++) {
            const v0 = vertices[i];
            const v1 = vertices[i+1];
            const dist = Math.hypot(v1[0] - v0[0], v1[1] - v0[1]);
            if (dist < 5) continue;
            
            const numTrees = Math.floor(dist / interval);
            const dx = (v1[0] - v0[0]) / dist;
            const dy = (v1[1] - v0[1]) / dist;
            const nx = -dy;
            const ny = dx;
            
            const offset = 6;
            
            for (let k = 1; k <= numTrees; k++) {
                const t = k / (numTrees + 1);
                const px = v0[0] + (v1[0] - v0[0]) * t;
                const py = v0[1] + (v1[1] - v0[1]) * t;
                
                if (Math.hypot(px, py) < BOARD_RADIUS - 20) {
                    // Left side tree
                    DUMMY.position.set(px + nx * offset, 2, py + ny * offset);
                    let th = 2.5 + Math.random() * 2;
                    let tw = 2 + Math.random() * 1.5;
                    DUMMY.scale.set(tw, th, tw);
                    DUMMY.rotation.set(0, 0, 0);
                    DUMMY.updateMatrix();
                    instData.trees.push(DUMMY.matrix.clone());
                    
                    // Right side tree
                    DUMMY.position.set(px - nx * offset, 2, py - ny * offset);
                    th = 2.5 + Math.random() * 2;
                    tw = 2 + Math.random() * 1.5;
                    DUMMY.scale.set(tw, th, tw);
                    DUMMY.rotation.set(0, 0, 0);
                    DUMMY.updateMatrix();
                    instData.trees.push(DUMMY.matrix.clone());
                }
            }
        }
    }

    function isPointInPolygon(x, y, vs) {
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
            const xi = vs[i][0], yi = vs[i][1];
            const xj = vs[j][0], yj = vs[j][1];
            const intersect = ((yi > y) !== (yj > y))
                && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    function scatterTreesInPark(vertices) {
        // Hard cap: max 5 trees per park polygon to avoid flooding the map
        if (instData.trees.length > 800) return;
        let minX = Infinity, maxX = -Infinity;
        let minY = Infinity, maxY = -Infinity;
        vertices.forEach(v => {
            minX = Math.min(minX, v[0]);
            maxX = Math.max(maxX, v[0]);
            minY = Math.min(minY, v[1]);
            maxY = Math.max(maxY, v[1]);
        });
        
        const area = (maxX - minX) * (maxY - minY);
        // Strict cap: 1 tree per 800 sq units, max 5 per park entity
        const treeCount = Math.min(5, Math.max(1, Math.floor(area / 800)));
        
        let attempts = 0;
        let placed = 0;
        while (placed < treeCount && attempts < treeCount * 5) {
            attempts++;
            const rx = minX + Math.random() * (maxX - minX);
            const ry = minY + Math.random() * (maxY - minY);
            if (isPointInPolygon(rx, ry, vertices)) {
                if (Math.hypot(rx, ry) < BOARD_RADIUS - 20) {
                    DUMMY.position.set(rx, 2, ry);
                    const th = 3 + Math.random() * 2;
                    const tw = 2 + Math.random() * 1.5;
                    DUMMY.scale.set(tw, th, tw);
                    DUMMY.rotation.set(0, 0, 0);
                    DUMMY.updateMatrix();
                    instData.trees.push(DUMMY.matrix.clone());
                    placed++;
                }
            }
        }
    }

    function buildParks() {

                ent.vertices.forEach(v => { sumX += v[0]; sumY += v[1]; });
                const pcx = sumX / ent.vertices.length;
                const pcy = sumY / ent.vertices.length;
                if (Math.hypot(pcx, pcy) > BOARD_RADIUS - 20) return;
                
                const shape = createShapeFromVertices(ent.vertices);
                if (shape) {
                    // Give parks a slight 3D thickness so they pop visually
                    const geom = new THREE.ExtrudeGeometry(shape, { depth: 0.6, bevelEnabled: false });

                    mesh.rotation.x = -Math.PI / 2;
                    mesh.position.y = 0.22;

    function getBuildingMaterials(cx, cz) {
        // ExtrudeGeometry groups: [0]=caps (roof/bottom), [1]=side walls
        // So: first material = roof, second material = facade

            return [defMat, defMat];
        } else {
            return [roofMat, hauMat];
        }
    }

    function buildBuildings() {
        if (!window.PARIS_MAP_DATA) return;
        const buildingEntities = window.PARIS_MAP_DATA.filter(ent => ent.layer === 'buildings');
        
        buildingEntities.forEach(ent => {
            let cx = 0, cz = 0;
            if (ent.vertices.length > 0) {
                let sumX = 0, sumY = 0;
                ent.vertices.forEach(v => {
                    sumX += v[0];
                    sumY += v[1];
                });
                cx = sumX / ent.vertices.length;
                cz = sumY / ent.vertices.length;
            }
            
            if (Math.hypot(cx, cz) > BOARD_RADIUS - 15) return;
            
            
            // Thin out Haussmann buildings by 12% randomly - leave some open lots
            const isDefense = cx < -150 && cz < -150;
            if (!isDefense && Math.random() < 0.12) {
                return;
            }

            const materials = getBuildingMaterials(cx, cz);
            
            if (ent.type === 'MESH' && ent.faces && ent.faces.length > 0) {
                // MESH buildings already have UVs generated by createMeshGeometry()
                const geom = createMeshGeometry(ent);
                const mesh = new THREE.Mesh(geom, materials[0]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
            } else if (ent.vertices && ent.vertices.length >= 3) {
                const shape = createShapeFromVertices(ent.vertices);
                if (shape) {
                    // Enforce minimum height so buildings aren't flat
                    const rawH = ent.thickness || 0;
                    const height = Math.max(6, rawH > 0 ? rawH : (8 + Math.random() * 18));
                    const extrudeSettings = {
                        depth: height,
                        bevelEnabled: false
                    };
                    const geom = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    // Remap UVs: use building-local coords with proper tiling
                    const posAttr = geom.attributes.position;
                    const uvAttr = geom.attributes.uv;
                    const normAttr = geom.attributes.normal;
                    if (uvAttr && posAttr) {
                        geom.computeVertexNormals();
                        for (let i = 0; i < uvAttr.count; i++) {
                            const px = posAttr.getX(i);
                            const py = posAttr.getY(i);
                            const pz = posAttr.getZ(i);
                            const nrm = geom.attributes.normal;
                            const anx = Math.abs(nrm.getX(i));
                            const any = Math.abs(nrm.getY(i));
                            const anz = Math.abs(nrm.getZ(i));
                            // Scale factor: 1 texture tile = ~12 world units (one building floor)
                            const sc = 1.0 / 12.0;
                            if (any > anx && any > anz) {
                                // Roof/floor cap → tile on XZ
                                uvAttr.setXY(i, px * sc, pz * sc);
                            } else if (anx > anz) {
                                // Wall facing X → tile on ZY (Z=horizontal, Y=vertical)
                                uvAttr.setXY(i, pz * sc, py * sc);
                            } else {
                                // Wall facing Z → tile on XY
                                uvAttr.setXY(i, px * sc, py * sc);
                            }
                        }
                        uvAttr.needsUpdate = true;
                    }
                    const mesh = new THREE.Mesh(geom, materials);
                    mesh.rotation.x = -Math.PI / 2;
                    mesh.position.y = 0.23;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                }
            }
        });
    }

        ];
        
        const tokenGoldMat = new THREE.MeshStandardMaterial({
            color: 0xd4af37,
            metalness: 0.95,
            roughness: 0.15
        });
        
        tokenConfig.forEach(cfg => {
            const tokenGroup = new THREE.Group();
            tokenGroup.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 1, 16), tokenGoldMat);
            base.position.y = 0.5;
            base.castShadow = true;
            tokenGroup.add(base);
            
            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 12, 8), tokenGoldMat);
            stick.position.y = 6.5;
            stick.castShadow = true;
            tokenGroup.add(stick);
            
            const frameDisk = new THREE.Mesh(new THREE.CylinderGeometry(8, 8, 1.2, 32), tokenGoldMat);
            frameDisk.position.y = 15;
            frameDisk.rotation.x = Math.PI / 2;
            frameDisk.rotation.z = Math.PI;
            frameDisk.castShadow = true;
            tokenGroup.add(frameDisk);
            
            const tex = createTokenTexture(cfg.type);
            const picMat = new THREE.MeshStandardMaterial({
                map: tex,
                roughness: 0.3,
                metalness: 0.1
            });
            const picDisk = new THREE.Mesh(new THREE.CylinderGeometry(7.2, 7.2, 0.2, 32), picMat);
            picDisk.position.set(0, 15, 0.7);
            picDisk.rotation.x = Math.PI / 2;
            picDisk.rotation.z = Math.PI;
            tokenGroup.add(picDisk);
            
            tokenGroup.rotation.y = Math.PI / 4;
            tokenGroup.userData = { initialY: cfg.pos[1] };
            scene.add(tokenGroup);
            tokens.push(tokenGroup);
        });
    }

    // ==========================================
    // FLOATING 3D LABELS & PHOTO TOKENS HELPERS
    // ==========================================
    function createTextSprite(text, size, color) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const fontSize = size || 28;
        ctx.font = `bold ${fontSize}px 'Nunito', sans-serif`;
        const textWidth = ctx.measureText(text).width;
        
        const paddingX = 24;
        const paddingY = 12;
        const w = textWidth + paddingX * 2;
        const h = fontSize + paddingY * 2;
        
        canvas.width = w;
        canvas.height = h;
        
        ctx.font = `bold ${fontSize}px 'Nunito', sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        
        // Pill background
        ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
        ctx.strokeStyle = color || '#ffffff';
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.roundRect(0, 0, w, h, h / 2);
        ctx.fill();
        ctx.stroke();
        
        // Text
        ctx.fillStyle = color || '#ffffff';
        ctx.fillText(text, w / 2, h / 2);
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        
        const material = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthTest: false
        });
        
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(w * 0.15, h * 0.15, 1);
        return sprite;
    }

    function createTokenTexture(type) {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        
        ctx.beginPath();
        ctx.arc(64, 64, 62, 0, Math.PI * 2);
        ctx.clip();
        
        const grad = ctx.createRadialGradient(64, 64, 10, 64, 64, 60);
        if (type === 'eiffel') {
            grad.addColorStop(0, '#fef08a');
            grad.addColorStop(1, '#ca8a04');
        } else if (type === 'notre_dame') {
            grad.addColorStop(0, '#fbcfe8');
            grad.addColorStop(1, '#db2777');
        } else if (type === 'sacre_coeur') {
            grad.addColorStop(0, '#e0f2fe');
            grad.addColorStop(1, '#0284c7');
        } else {
            grad.addColorStop(0, '#dcfce7');
            grad.addColorStop(1, '#15803d');
        }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);
        
        ctx.fillStyle = '#1e293b';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        
        if (type === 'eiffel') {
            ctx.beginPath();
            ctx.moveTo(64, 18);
            ctx.lineTo(60, 50);
            ctx.lineTo(54, 85);
            ctx.lineTo(44, 110);
            ctx.lineTo(50, 110);
            ctx.quadraticCurveTo(64, 92, 78, 110);
            ctx.lineTo(84, 110);
            ctx.lineTo(74, 85);
            ctx.lineTo(68, 50);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.fillRect(57, 50, 14, 3);
            ctx.fillRect(51, 85, 26, 3);
        } else if (type === 'notre_dame') {
            ctx.beginPath();
            ctx.rect(44, 52, 40, 48);
            ctx.rect(40, 26, 12, 42);
            ctx.rect(76, 26, 12, 42);
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(64, 70, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(64, 70, 5, 0, Math.PI * 2);
            ctx.fill();
        } else if (type === 'sacre_coeur') {
            ctx.beginPath();
            ctx.rect(39, 65, 50, 35);
            ctx.moveTo(64, 25);
            ctx.arc(64, 45, 17, 0, Math.PI, true);
            ctx.moveTo(46, 52);
            ctx.arc(46, 62, 8, 0, Math.PI, true);
            ctx.moveTo(82, 52);
            ctx.arc(82, 62, 8, 0, Math.PI, true);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillRect(63, 20, 2, 8);
            ctx.fillRect(45, 48, 2, 6);
            ctx.fillRect(81, 48, 2, 6);
        } else {
            ctx.beginPath();
            ctx.rect(42, 45, 44, 55);
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(52, 100);
            ctx.lineTo(52, 75);
            ctx.arc(64, 75, 12, Math.PI, 0, false);
            ctx.lineTo(76, 100);
            ctx.closePath();
            ctx.fillStyle = '#1e293b';
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(42, 50, 44, 3);
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        return texture;
    }

    // ==========================================
    // UI INTERACTION & MODE LOGIC
    // ==========================================
    window.toggleControlMode = function() {
        const btn = document.getElementById('btn-mode');
        const text = document.getElementById('mode-text');
        
        if (controlMode === 'live') {
            controlMode = 'manual';
            btn.style.background = 'linear-gradient(to bottom, #f97316, #ea580c)';
            text.innerHTML = '🎮 MANUAL';
        } else {
            controlMode = 'live';
            btn.style.background = 'linear-gradient(to bottom, #10b981, #059669)';
            text.innerHTML = '🛰️ LIVE';
        }
    };

    window.toggleDistrict = function(dName, btnEl) {
        // Switch to manual mode immediately if user commands a toggle
        if (controlMode === 'live') {
            toggleControlMode();
        }
        
        btnEl.classList.toggle('active');
        const isActive = !districtStates[dName];
        setDistrictState(dName, isActive);
        updateEnergyBar();
    };

    window.setDistrictState = function(dName, isActive) {
        districtStates[dName] = isActive;
        updateEmissiveIntensities();
    };

    function updateEmissiveIntensities() {
        const factor = isNight ? 1.0 : 0.3; // Glow is bright at night, dim in day

        if (districtMeshes.haussmann) {
            districtMeshes.haussmann.material.emissiveIntensity = districtStates.haussmann ? 1.0 * factor : 0.0;
        }
        if (districtMeshes.defense) {
            districtMeshes.defense.material.emissiveIntensity = districtStates.defense ? 1.0 * factor : 0.0;
        }
        if (goldMat) {
            goldMat.emissiveIntensity = districtStates.monuments ? 1.0 * factor : 0.0;
        }
    }

    window.toggleStatsModal = function() {
        const modal = document.getElementById('stats-modal');
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    };

    function updateEnergyBar() {
        let consumption = 5;
        let h_val = districtStates.haussmann ? 40 : 0;
        let d_val = districtStates.defense ? 35 : 0;
        let m_val = districtStates.monuments ? 20 : 0;
        consumption += h_val + d_val + m_val;
        
        const fill = document.getElementById('energy-fill');
        fill.style.width = consumption + '%';
        
        if(consumption > 80) fill.style.background = '#ef4444';
        else if(consumption > 50) fill.style.background = '#facc15';
        else fill.style.background = '#4ade80';

        // Update modal values (in case modal is open)
        if (document.getElementById('val-haussmann')) {
            document.getElementById('val-haussmann').innerText = h_val.toFixed(1) + '%';
            document.getElementById('bar-haussmann').style.width = h_val + '%';
            document.getElementById('val-defense').innerText = d_val.toFixed(1) + '%';
            document.getElementById('bar-defense').style.width = d_val + '%';
            document.getElementById('val-monuments').innerText = m_val.toFixed(1) + '%';
            document.getElementById('bar-monuments').style.width = m_val + '%';

            let efficiency = 100;
            if (consumption > 80) efficiency = 70;
            else if (consumption > 50) efficiency = 88;
            document.getElementById('val-efficiency').innerText = efficiency + '%';
            document.getElementById('val-efficiency').style.color = efficiency > 80 ? '#4ade80' : '#ef4444';

            let co2 = 'Faible (Éco)';
            if (consumption > 80) {
                co2 = 'Critique (Pic)';
                document.getElementById('val-co2').style.color = '#ef4444';
            } else if (consumption > 40) {
                co2 = 'Standard';
                document.getElementById('val-co2').style.color = '#fbbf24';
            } else {
                document.getElementById('val-co2').style.color = '#4ade80';
            }
            document.getElementById('val-co2').innerText = co2;
        }
    }

    function updateEnergyBarFromLoad(total) {
        const max_capacity = 150;
        let pct = (total / max_capacity) * 100;
        if(pct > 100) pct = 100;
        
        const fill = document.getElementById('energy-fill');
        fill.style.width = pct + '%';
        
        if(pct > 80) fill.style.background = '#ef4444';
        else if(pct > 50) fill.style.background = '#facc15';
        else fill.style.background = '#4ade80';
    }

    window.toggleDayNight = function() {
        isNight = !isNight;
        const btn = document.getElementById('btn-daynight');
        btn.innerHTML = isNight ? '🌙' : '🌞';
        
        const targetSky = isNight ? new THREE.Color(0x020205) : new THREE.Color(0x0a0a1a); scene.fog = null;
        const targetAmbient = isNight ? 0.15 : 0.6;
        const targetSun = isNight ? 0.1 : 1.2;

        scene.background = targetSky;
        ambient.intensity = targetAmbient;
        sun.intensity = targetSun;

        updateEmissiveIntensities();
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        if(controls) controls.update();

        // Wow animations: float text labels and rock photo tokens
        const time = Date.now() * 0.001;
        
        labelSprites.forEach((sprite, i) => {
            sprite.position.y = (sprite.userData && sprite.userData.initialY !== undefined ? sprite.userData.initialY : 35) + Math.sin(time * 2 + i) * 1.5;
        });
        
        tokens.forEach((token, i) => {
            token.rotation.y = Math.PI / 4 + Math.sin(time * 1.5 + i) * 0.15;
            const initialY = token.userData && token.userData.initialY !== undefined ? token.userData.initialY : 0;
            token.position.y = initialY + Math.sin(time * 2.5 + i) * 0.4;
        });

        renderer.render(scene, camera);
    }

    // ==========================================
    // ACCESSIBILITY & WEBSOCKET CLIENT
    // ==========================================
    window.toggleColorblindMenu = function() {
        const menu = document.getElementById('cb-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    };

    window.setColorblindMode = function(mode, btnEl) {
        document.querySelectorAll('.cb-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        
        if (mode === 'none') {
            document.body.style.filter = 'none';
        } else {
            document.body.style.filter = `url(#${mode})`;
        }
    };

    let ws;
    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:8080');
        
        ws.onopen = () => {
            document.getElementById('ws-status').className = 'connection-status connected';
            document.getElementById('ws-status').innerHTML = '🟢 Données Capteurs Live';
        };
        
        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);
            if(payload.type === 'energy_load_update') {
                updateFromSensorData(payload.data);
            }
        };
        
        ws.onclose = () => {
            document.getElementById('ws-status').className = 'connection-status';
            document.getElementById('ws-status').innerHTML = '🔴 Déconnecté';
            setTimeout(connectWebSocket, 5000); // Try reconnect
        };
    }

    function updateFromSensorData(data) {
        if (controlMode !== 'live') {
            updateEnergyBarFromLoad(data.total_load);
            return;
        }

        const h_active = data.haussmann_load > 45;
        const d_active = data.defense_load > 40;
        const m_active = data.monuments_load > 25;
        
        if(districtStates.haussmann !== h_active) {
            document.getElementById('btn-haussmann').classList.toggle('active', h_active);
            setDistrictState('haussmann', h_active);
        }
        if(districtStates.defense !== d_active) {
            document.getElementById('btn-defense').classList.toggle('active', d_active);
            setDistrictState('defense', d_active);
        }
        if(districtStates.monuments !== m_active) {
            document.getElementById('btn-monuments').classList.toggle('active', m_active);
            setDistrictState('monuments', m_active);
        }
        
        updateEnergyBarFromLoad(data.total_load);

        // Update stats modal elements dynamically from real websocket sensor readings
        if (document.getElementById('val-haussmann')) {
            document.getElementById('val-haussmann').innerText = data.haussmann_load.toFixed(1) + '%';
            document.getElementById('bar-haussmann').style.width = Math.min(100, data.haussmann_load * 1.5) + '%';
            document.getElementById('val-defense').innerText = data.defense_load.toFixed(1) + '%';
            document.getElementById('bar-defense').style.width = Math.min(100, data.defense_load * 1.5) + '%';
            document.getElementById('val-monuments').innerText = data.monuments_load.toFixed(1) + '%';
            document.getElementById('bar-monuments').style.width = Math.min(100, data.monuments_load * 2.5) + '%';

            let efficiency = 100 - Math.max(0, (data.total_load - 100) * 0.5);
            efficiency = Math.max(50, Math.round(efficiency));
            document.getElementById('val-efficiency').innerText = efficiency + '%';
            document.getElementById('val-efficiency').style.color = efficiency > 85 ? '#4ade80' : '#ef4444';

            let co2 = 'Standard';
            if (data.total_load > 120) {
                co2 = 'Élevé (Pic)';
                document.getElementById('val-co2').style.color = '#ef4444';
            } else if (data.total_load < 80) {
                co2 = 'Faible (Éco)';
                document.getElementById('val-co2').style.color = '#4ade80';
            } else {
                document.getElementById('val-co2').style.color = '#fbbf24';
            }
            document.getElementById('val-co2').innerText = co2;
        }
    }

    init();
    connectWebSocket();
    renderLoop();

</script>
</body>
</html>
